version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

  - package-ecosystem: "cargo"
    directory: "/pycrockford_rs"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14
